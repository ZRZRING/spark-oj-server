# https://goframe.org/docs/web/server-config-file-template
server:
  address:     ":8000"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"

# https://goframe.org/docs/core/glog-config
logger:
  path: "output"
  file: "{Y-m-d}.log"
  level : "all"
  stdout: true
  header: true

# https://goframe.org/docs/core/gdb-config-file
database:
  logger:
    path: "output"
    file: "{Y-m-d}.db.log"
    level: "all"
    # stdout: true
  default:
    link: "pgsql:postgres:postgres@tcp(127.0.0.1:15432)/spark-oj"
    timezone: "Asia/Shanghai"
    debug: true

# 自定义配置

upload:
  path:
    testcases: "../data/testcases"

judge:
  apiBaseUrl: "http://127.0.0.1:15050"
  timeout: 15

redis:
  default:
    address: "127.0.0.1:16379"
    password: ""
    db: 0